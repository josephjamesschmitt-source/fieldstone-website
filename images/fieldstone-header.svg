<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 90" width="680" height="90">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Lora:wght@600&amp;family=Oswald:wght@300;400&amp;display=swap');
    </style>
    <linearGradient id="sky-doc" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#8aa8bc" stop-opacity="0.45"/>
      <stop offset="60%"  stop-color="#9ab8c8" stop-opacity="0.35"/>
      <stop offset="85%"  stop-color="#c8a870" stop-opacity="0.40"/>
      <stop offset="100%" stop-color="#b89060" stop-opacity="0.32"/>
    </linearGradient>
    <linearGradient id="field-doc" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#7a9e6a"/>
      <stop offset="100%" stop-color="#3e5434"/>
    </linearGradient>
    <radialGradient id="sun-doc" cx="80%" cy="90%" r="50%">
      <stop offset="0%"   stop-color="#d4a040" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#d4a040" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- White background -->
  <rect width="680" height="90" fill="#ffffff"/>

  <!-- Top accent bar -->
  <rect x="0" y="0" width="680" height="2.5" fill="#7a9470"/>

  <!-- FIELDSTONE wordmark -->
  <text x="24" y="42"
    font-family="'Lora', Georgia, serif"
    font-size="36"
    font-weight="600"
    letter-spacing="3"
    fill="#243020">FIELDSTONE</text>

  <!-- Group Holdings submark -->
  <text x="26" y="57"
    font-family="'Oswald', 'Gill Sans', sans-serif"
    font-size="10"
    font-weight="300"
    letter-spacing="5.5"
    fill="#5a7850">Group Holdings</text>

  <!-- Thin divider -->
  <line x1="24" y1="67" x2="330" y2="67" stroke="#c0b8a8" stroke-width="0.75"/>

  <!-- Compact landscape mark — right side -->
  <!-- Sky -->
  <rect x="380" y="8" width="276" height="40" fill="url(#sky-doc)"/>
  <rect x="380" y="8" width="276" height="40" fill="url(#sun-doc)"/>

  <!-- Sun hint -->
  <ellipse cx="628" cy="34" rx="14" ry="14" fill="#d4a040" opacity="0.16"/>
  <ellipse cx="628" cy="34" rx="7"  ry="7"  fill="#e8b84a" opacity="0.26"/>

  <!-- Treeline -->
  <path d="M380,36 Q420,30 460,34 Q500,29 540,33 Q580,28 620,32 L656,33 L656,46 L380,46 Z"
        fill="#5a7850" opacity="0.50"/>

  <!-- Horizon -->
  <rect x="380" y="45" width="276" height="1.5" fill="#4a6840" opacity="0.65"/>

  <!-- Field -->
  <rect x="380" y="46.5" width="276" height="20" fill="url(#field-doc)"/>

  <!-- Stone wall -->
  <rect x="380" y="55" width="24"  height="11" rx="1" fill="#344830" opacity="0.75"/>
  <rect x="407" y="55" width="16"  height="11" rx="1" fill="#344830" opacity="0.60"/>
  <rect x="426" y="55" width="28"  height="11" rx="1" fill="#344830" opacity="0.70"/>
  <rect x="457" y="55" width="18"  height="11" rx="1" fill="#344830" opacity="0.55"/>
  <rect x="478" y="55" width="26"  height="11" rx="1" fill="#344830" opacity="0.65"/>
  <rect x="507" y="55" width="14"  height="11" rx="1" fill="#344830" opacity="0.58"/>
  <rect x="524" y="55" width="30"  height="11" rx="1" fill="#344830" opacity="0.72"/>
  <rect x="557" y="55" width="20"  height="11" rx="1" fill="#344830" opacity="0.60"/>
  <rect x="580" y="55" width="18"  height="11" rx="1" fill="#344830" opacity="0.66"/>
  <rect x="601" y="55" width="26"  height="11" rx="1" fill="#344830" opacity="0.52"/>
  <rect x="630" y="55" width="26"  height="11" rx="1" fill="#344830" opacity="0.68"/>

  <!-- Bottom rule - full width -->
  <rect x="0" y="82" width="680" height="1" fill="#c0b8a8" opacity="0.6"/>
</svg>
